<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sports Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
</head>
<body>
  <header class="site-header">
    <h1>Sports Dashboard</h1>
    <p>加速度・心拍データ可視化</p>
  </header>

  <main class="container">
    <section class="panel controls">
      <div class="control-group">
        <label for="playerSelect">選手</label>
        <select id="playerSelect"></select>
      </div>

      <div class="control-group">
        <label for="dateSelect">日付</label>
        <select id="dateSelect"></select>
      </div>

      <div class="control-group">
        <label for="sessionSelect">セッション</label>
        <select id="sessionSelect"></select>
      </div>

      <div class="control-group">
        <button id="reloadBtn">更新</button>
      </div>
    </section>

    <section class="panel summary">
      <h2>サマリー</h2>
      <div id="summaryCards" class="summary-cards"></div>
    </section>

    <section class="panel">
      <h2>心拍時系列</h2>
      <div id="hrChart" class="chart"></div>
    </section>

    <section class="panel">
      <h2>加速度合成値時系列</h2>
      <div id="accChart" class="chart"></div>
    </section>

    <section class="panel">
      <h2>心拍 vs 加速度</h2>
      <div id="scatterChart" class="chart"></div>
    </section>

    <section class="panel">
      <h2>データ情報</h2>
      <div id="metaInfo" class="meta-info"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
